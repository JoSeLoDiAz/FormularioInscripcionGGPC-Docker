services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: SepBD2026
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - appnet

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: formulario_backend
    env_file:
      - ./Backend/.env
    restart: unless-stopped
    depends_on:
      - oracle
    networks:
      - appnet

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: formulario_frontend
    restart: unless-stopped
    networks:
      - appnet

  nginx:
    image: nginx:stable-alpine
    container_name: formulario_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  oracle_data:
    external: true
    name: oracle-xe-data
