services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: formulario_backend
    env_file:
      - ./Backend/.env
    restart: unless-stopped
    networks:
      - appnet

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: formulario_frontend
    restart: unless-stopped
    networks:
      - appnet

  nginx:
    image: nginx:stable-alpine
    container_name: formulario_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
